<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Generator - Malviyan Virtual Lab</title>
    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --bg: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .lab-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #eee;
            margin-bottom: 10px;
        }

        .lab-info {
            flex-grow: 1;
        }

        .lab-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin-top: 5px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start {
            background-color: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-start:hover {
            background-color: rgba(46, 125, 50, 0.05);
        }

        .btn-cert {
            background-color: var(--primary);
            color: white;
            margin-top: 5px;
            font-size: 0.9em;
        }

        .btn-cert:hover {
            background-color: var(--primary-dark);
        }

        .input-group {
            margin-top: 20px;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .setup-section {
            border-top: 2px solid #eee;
            padding-top: 20px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Malviyan Virtual Lab</h1>

        <div class="input-group">
            <label for="studentName">Enter Your Name:</label>
            <input type="text" id="studentName" placeholder="e.g. John Doe" oninput="updateName()">
        </div>

        <div id="experiments-list">
            <!-- Experiment 1 -->
            <div class="lab-item">
                <div class="lab-info">
                    <div class="lab-title">8085 Microprocessor Virtual Lab</div>
                    <div class="lab-meta">Completion: <span id="p1-text">0%</span></div>
                    <div class="progress-container">
                        <div id="p1-bar" class="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <button class="btn btn-start" onclick="simulateProgress(1)">Start Experiment</button>
                    <button id="cert-btn-1" class="btn btn-cert hidden"
                        onclick="generateCertificate('8085 Microprocessor Virtual Lab')">Generate Certificate</button>
                </div>
            </div>

            <!-- Experiment 2 -->
            <div class="lab-item">
                <div class="lab-info">
                    <div class="lab-title">Logic Gates Simulation</div>
                    <div class="lab-meta">Completion: <span id="p2-text">0%</span></div>
                    <div class="progress-container">
                        <div id="p2-bar" class="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end;">
                    <button class="btn btn-start" onclick="simulateProgress(2)">Start Experiment</button>
                    <button id="cert-btn-2" class="btn btn-cert hidden"
                        onclick="generateCertificate('Logic Gates Simulation')">Generate Certificate</button>
                </div>
            </div>
        </div>

        <p style="text-align: center; font-size: 0.8em; color: #888; margin-top: 30px;">
            Note: Click "Start Experiment" to simulate completion. Enter your name first!
        </p>
    </div>

    <script>
        // Global variables
        let studentName = "";

        function updateName() {
            studentName = document.getElementById('studentName').value.trim();
        }

        function simulateProgress(id) {
            const bar = document.getElementById(`p${id}-bar`);
            const text = document.getElementById(`p${id}-text`);
            const certBtn = document.getElementById(`cert-btn-${id}`);

            // For demo, we just jump to 100%
            bar.style.width = "100%";
            text.innerText = "100%";
            certBtn.classList.remove('hidden');
        }

        async function generateCertificate(experimentName) {
            if (!studentName) {
                alert("Please enter your name first!");
                document.getElementById('studentName').focus();
                return;
            }

            // Destructure jsPDF from window.jspdf
            const { jsPDF } = window.jspdf;

            // Create a new document (Landscape, A4)
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'mm',
                format: 'a4'
            });

            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();

            // --- Optional Enhancement: Add a professional border ---
            doc.setDrawColor(46, 125, 50); // Primary color
            doc.setLineWidth(2);
            doc.rect(10, 10, pageWidth - 20, pageHeight - 20); // Outer border

            doc.setLineWidth(0.5);
            doc.rect(12, 12, pageWidth - 24, pageHeight - 24); // Inner subtle border

            // --- Certificate Content ---

            // 1. Lab Name
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(46, 125, 50); // Greenish color
            doc.text("Malviyan Virtual Lab", pageWidth / 2, 40, { align: "center" });

            // 2. Title
            doc.setFontSize(30);
            doc.setTextColor(51, 51, 51); // Dark gray
            doc.text("Certificate of Completion", pageWidth / 2, 65, { align: "center" });

            // 3. Sub-text
            doc.setFont("helvetica", "normal");
            doc.setFontSize(16);
            doc.text("This is to certify that", pageWidth / 2, 85, { align: "center" });

            // 4. Student Name (Larger font)
            doc.setFont("helvetica", "bolditalic");
            doc.setFontSize(36);
            doc.setTextColor(0, 0, 0);
            doc.text(studentName, pageWidth / 2, 110, { align: "center" });

            // 5. Completion text
            doc.setFont("helvetica", "normal");
            doc.setFontSize(16);
            doc.setTextColor(51, 51, 51);
            doc.text("has successfully completed the experiment", pageWidth / 2, 130, { align: "center" });

            // 6. Experiment Name
            doc.setFont("helvetica", "bold");
            doc.setFontSize(20);
            doc.text(experimentName, pageWidth / 2, 150, { align: "center" });

            // 7. Date
            const today = new Date().toLocaleDateString('en-GB', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            doc.setFont("helvetica", "italic");
            doc.setFontSize(14);
            doc.text(`Completed on: ${today}`, pageWidth / 2, 170, { align: "center" });

            // 8. Signature Section
            doc.setDrawColor(150, 150, 150);
            doc.line(pageWidth / 2 - 40, 190, pageWidth / 2 + 40, 190); // Signature line

            doc.setFont("helvetica", "bold");
            doc.setFontSize(12);
            doc.text("Authorized by Malviyan Virtual Lab", pageWidth / 2, 198, { align: "center" });

            // Download the PDF
            doc.save(`${studentName}_Certificate.pdf`);
        }
    </script>
</body>

</html>
